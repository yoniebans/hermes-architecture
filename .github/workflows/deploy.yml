name: Deploy Atlas

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Main branch: deploy to root of gh-pages (the live site)
      - name: Deploy main to root
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean: false
          clean-exclude: pr-*

      # PR branches: deploy to /pr-N/ subfolder
      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rajyan/preview-pages@v1
        with:
          source-dir: .
          pr-per-commit: "false"
          pr-comment: sticky
          branch-per-commit: "false"
