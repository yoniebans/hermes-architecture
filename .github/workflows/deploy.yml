name: Deploy Atlas

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preview Pages
        uses: rajyan/preview-pages@v1
        with:
          source-dir: .
          pr-per-commit: "false"
          pr-comment: sticky
          branch-per-commit: "false"
